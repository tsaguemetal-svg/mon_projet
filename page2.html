<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONG Green Future Cameroon</title>
</head>
<body>
<section>
    <div id="formulaire-inscription" style="padding: 50px 20px;">
  <p style="text-align: center;  color: #2D5A27; margin-left:100px;">Remplissez ce formulaire pour devenir membre ou bénévole.</p>
    <h2 style="text-align: center;  color: #2D5A27;">Formulaire d'adhésion</h2>
 
      </div>
</section>
         
    <form action="https://formspree.io/f/xkokrzkz" method="POST" style="display: flex; flex-direction: column; max-width: 400px; margin: 0 auto; gap: 15px; text-align: left;">
<div> <label>
            <input type="checkbox" name="interet" value="benevole">benevole
        </label>
        <label>
            <input type="checkbox" name="interet" value="membre">membre
        </label>
    </div>
        <label>Nom :</label>
        <input type="text" name="nom" placeholder="Votre nom" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
         <label>Prenom :</label>
        <input type="text" name="prenom" placeholder="Votre prenom" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">

        <label>Email :</label>
        <input type="email" name="email" placeholder="votre@email.com" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">

         <label>numero whatsapp</label>
        <input type="tel" name="numero" placeholder="93729000" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">

        <label style="font-weight: bold; color: #2D5A27;">Date de naissance :</label>
        <input type="date" name="date_naissance" required style="width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
        
        <label>Pourquoi voulez-vous nous rejoindre ?</label>
        <textarea name="message" rows="4" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
        
        <button type="submit" style="background-color: #2D5A27; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">
            S'inscrire
        </button>
    </form>
</body>
</html>
